version: 2

updates:
  # Node.js / npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
      timezone: "Africa/Johannesburg"

    open-pull-requests-limit: 10

    commit-message:
      prefix: "deps"
      include: "scope"

    labels:
      - "dependencies"
      - "npm"

    reviewers:
      - "Horsementech"

    groups:
      nextjs:
        patterns:
          - "next"
          - "react"
          - "react-dom"

      prisma:
        patterns:
          - "@prisma/*"
          - "prisma"

      radix:
        patterns:
          - "@radix-ui/*"

      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
          - "tailwindcss-*"

      types:
        patterns:
          - "@types/*"

      remaining:
        patterns:
          - "*"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:30"
      timezone: "Africa/Johannesburg"

    open-pull-requests-limit: 5

    commit-message:
      prefix: "ci"

    labels:
      - "github-actions"
      - "dependencies"

    reviewers:
      - "sya-one"